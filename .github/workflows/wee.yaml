name: "🚀 Чистая сборка ядер для релиза"

env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_call:
    inputs:
      from_ci:
        type: boolean
        required: false
        default: true

  workflow_dispatch:
    inputs:
      make_release_manual:
        description: "Создавать релиз на GitHub? (Если отключить, ZIP будет только в артефактах)"
        required: true
        type: boolean
        default: true

jobs:
  Set-repos:
    name: "📊 Анализ конфигурации repos.json"
    runs-on: ubuntu-latest
    if: github.repository_owner == 'weekanya' && github.repository == 'weekanya/Begonia-Kernel-Builder'
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}
    steps:
      - name: "📥 Получение исходного кода билдера"
        uses: actions/checkout@v3

      - name: "🗂️ Генерация матрицы сборки"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          jq -s '[.[][]]' repos/repos*.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: "⏰ Установка даты сборки"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🛠️ Сборка ядра"
    runs-on: ubuntu-latest
    if: github.repository_owner == 'weekanya' && github.repository == 'weekanya/Begonia-Kernel-Builder'
    needs:
      - Set-repos
    strategy:
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      WORKSPACE: ${{ github.workspace }}
      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KNAME: ${{ matrix.repos.kernelName }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      ccache: ${{ matrix.repos.ccache }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}

    steps:
      - name: "📌 Настройка переменных ядра"
        run: |
          echo "KERNEL_NAME=${{ matrix.repos.kernelSource.name }}" >> $GITHUB_ENV
          echo "KERNEL_REPO=${{ matrix.repos.kernelSource.repo }}" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=${{ matrix.repos.kernelSource.branch }}" >> $GITHUB_ENV

          echo "toolchains=$(echo '${{ toJSON(matrix.repos.toolchains) }}' | jq -c)" >> $GITHUB_ENV
          echo "params=$(echo '${{ toJSON(matrix.repos.params) }}' | jq -c)" >> $GITHUB_ENV
          echo "THREAD=$(nproc --all)" >> $GITHUB_ENV

      - name: "📦 Установка необходимых пакетов и окружения"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev
          sudo apt-get install -y curl git ftp lftp wget libarchive-tools ccache
          sudo apt-get install -y zip unzip tar gzip bzip2 rar unrar
          sudo apt-get install -y checkinstall libncursesw5-dev libsqlite3-dev tk-dev libgdbm-dev libc6-dev libbz2-dev libffi-dev
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xvf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure
          make -j$(nproc)
          sudo make install
          curl https://bootstrap.pypa.io/pip/2.7/get-pip.py -o get-pip.py
          sudo python2.7 get-pip.py
          sudo update-alternatives --install /usr/bin/python python /usr/local/lib/python2.7 1
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3 2 || true
          cd ..

      - name: "🧹 Очистка старых запусков воркфлоу"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L400 --json databaseId -q '.[].databaseId' | tail -n+5 | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :

      - name: "🔑 Генерация ключа кэша из конфигурации"
        if: ${{ env.ccache == 'true' }}
        id: ccache_key
        run: |
          ccache -o compression=false -o cache_dir=$HOME/.ccache
          echo "CACHE_KEY=$(echo -n '${{ toJSON(matrix.repos) }}' | base64 -w 0 | cut -c -48)" >> $GITHUB_OUTPUT

      - name: "⚡ Синхронизация кэша ccache"
        if: ${{ env.ccache == 'true' }}
        uses: actions/cache@v3
        with:
          path: |
            ~/.ccache
            ${{ env.OUT_DIR }}
          key: ccache-${{ env.KERNEL_NAME }}-${{ steps.ccache_key.outputs.CACHE_KEY }}-${{ env.builddate }}
          restore-keys: |
            ccache-${{ env.KERNEL_NAME }}-${{ steps.ccache_key.outputs.CACHE_KEY }}-${{ env.builddate }}

      - name: "📐 Загрузка и настройка AnyKernel3"
        env:
          params: "${{ toJSON(matrix.repos.AnyKernel3) }}"
        run: |
          ANYKERNEL_REPO=$(echo $params | jq -r ".repo")
          ANYKERNEL_BRANCH=$(echo $params | jq -r ".branch")
          git clone --recursive --depth=1 -j $(nproc) --branch $ANYKERNEL_BRANCH $ANYKERNEL_REPO AnyKernel3
          echo "[+] Окружение AnyKernel3 успешно настроено."

      - name: "🌐 Клонирование исходного кода ядра"
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch $KERNEL_BRANCH $KERNEL_REPO $KERNEL_NAME
          echo -e "\n[!] Текущий коммит ядра: $(git -C $KERNEL_NAME rev-parse HEAD)\n"

      - name: "🔧 Загрузка и подготовка тулчейнов компиляции"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          echo "[+] Найдено описаний тулчейнов: $toolchains_num"
          for ((i=0;i<toolchains_num;i++)); do
            toolchain_name=$(echo $toolchains | jq -r ".[$i].name")
            toolchain_repo=$(echo $toolchains | jq -r ".[$i].repo")
            toolchain_branch=$(echo $toolchains | jq -r ".[$i].branch")
            toolchain_url=$(echo $toolchains | jq -r ".[$i].url")

            if [ -z "${toolchain_url:-}" ] || [ "$toolchain_url" = "null" ];  then
              git clone --recursive --depth=1 -j $(nproc) --branch $toolchain_branch $toolchain_repo $toolchain_name
              echo "[+] Клонирование тулчейна $toolchain_name"
            else
              wget "$toolchain_url"
              filename="${toolchain_url##*/}"
              mkdir -p $toolchain_name
              case "$filename" in
                *.zip) unzip -d $toolchain_name "$filename" ;;
                *.tar) tar xvf "$filename" -C $toolchain_name ;;
                *.tar.gz) tar zxvf "$filename" -C $toolchain_name ;;
                *.rar) unrar x "$filename" $toolchain_name ;;
                *) echo "[!] Неизвестный тип архива: $filename" ;;
              esac
            fi

            jq -r ".[$i].binPath[] | tostring" <<< "$toolchains" | while read -r bin_path; do
              echo "$WORKSPACE/$toolchain_name/$bin_path" >> $GITHUB_PATH
            done
          done

      - name: "⚙️ Формирование аргументов сборки (make args)"
        id: generate-args
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CC=$(echo $params | jq -r ".CC")

          args="-j${{ env.THREAD }}"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p ${{ env.OUT_DIR }} && args="$args O=${{ env.OUT_DIR }}"
          fi
          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          if [ -n "$CC" ]; then
            if [[ "$CC" == *"/"* ]]; then
              CC=${{ env.WORKSPACE }}/$CC
            fi
            if [ ${{ env.ccache }} = true ]; then
              args="$args CC=\"ccache $CC\""
            else
              args="$args CC=$CC"
            fi
          fi
          while read -r externalCommand; do
            key=$(echo "$externalCommand" | cut -d= -f1)
            value=$(echo "$externalCommand" | cut -d= -f2)
            if [[ "$value" == *"/"* ]]; then
              value="${{ env.WORKSPACE }}/$value"
            fi
            args="$args $key=$value"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$params")

          echo "ARCH=$ARCH" >> $GITHUB_OUTPUT
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "👍 Инициализация конфигурации ядра (Make defconfig)"
        working-directory: ${{ env.WORKSPACE }}/${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
          arch: ${{ steps.generate-args.outputs.ARCH }}
          KBUILD_BUILD_USER: "weekanya"
          KBUILD_BUILD_HOST: "begonia"
        run: |
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}
          ./scripts/config --set-str LOCALVERSION "-Power-Kernel-Stock"

      - name: "🎶 Компиляция исходного кода ядра"
        working-directory: ${{ env.WORKSPACE }}/${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
          KBUILD_BUILD_USER: "weekanya"
          KBUILD_BUILD_HOST: "begonia"
        run: |
          make ${{ env.args }}

      - name: "❤️ Упаковка готового ядра в AnyKernel3.zip"
        if: ${{ env.useAnykernel == 'true' }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
          anykernel: "${{ env.WORKSPACE }}/${{ env.KERNEL_DEVICE }}-Stock-${{ env.KERNEL_NAME }}-${{ env.builddate }}"
        run: |
          if [ -e "${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz" ]; then
            cp -f ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz ./AnyKernel3/
          fi
          cd AnyKernel3/
          zip -q -r "${{ env.anykernel }}.zip" *

      - name: "💾 Сохранение ZIP архива в артефакты сборки"
        uses: actions/upload-artifact@v4
        if: ${{ env.useAnykernel == 'true' }}
        with:
          name: "${{ env.KERNEL_DEVICE }}-Stock-${{ env.KERNEL_NAME }}-${{ env.builddate }}"
          path: AnyKernel3/*

      - name: "🧧 Публикация релиза на GitHub"
        continue-on-error: false
        uses: softprops/action-gh-release@v2.1.0
        if: ${{ env.useAnykernel == 'true' && env.release == 'true' && (github.event.inputs.make_release_manual == 'true' || github.event_name == 'workflow_call') }}
        with:
          tag_name: v${{ env.builddate }}
          name: v${{ env.builddate }}
          make_latest: true
          prerelease: false
          draft: false
          generate_release_notes: false
          body: |
            ### 🚀 Чистый релиз ядра Power Kernel для Redmi Note 8 Pro (begonia)
            
            Сборка выполнена автоматически с использованием среды облачной интеграции GitHub Actions.
            
            **Особенности релиза:**
            * Архитектура ядра Linux: 4.14.355
            * Стоковая сборка без рут-модификаций и сторонних патчей
            * Оптимизировано под тулчейн Clang / LLVM
            
            **Инструкция по установке:**
            1. Скачайте прикрепленный архив формата `.zip`.
            2. Загрузитесь в кастомное восстановление (TWRP/OrangeFox).
            3. Перед прошивкой сделайте бэкап текущего раздела `boot`.
            4. Установите архив и выполните перезагрузку в систему.
          files: "${{ env.WORKSPACE }}/${{ env.KERNEL_DEVICE }}-Stock-${{ env.KERNEL_NAME }}-${{ env.builddate }}.zip"
          fail_on_unmatched_files: true
          preserve_order: true
